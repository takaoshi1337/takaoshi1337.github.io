name: Update Steam Activity

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Steam data
        run: |
          curl -s "https://api.steampowered.com/IPlayerService/GetRecentlyPlayedGames/v1/?key=${{ secrets.STEAM_API_KEY }}&steamid=${{ secrets.STEAM_ID }}&count=1" \
          > assets/data/steam.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/data/steam.json
          git diff --cached --quiet || git commit -m "chore: update steam activity"
          git push
