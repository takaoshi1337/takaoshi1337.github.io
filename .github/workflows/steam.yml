name: Update Steam Activity

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest game from Steam
        run: |
          mkdir -p assets/data
          curl -s "https://api.steampowered.com/IPlayerService/GetRecentlyPlayedGames/v1/?key=${{ secrets.STEAM_API_KEY }}&steamid=${{ secrets.STEAM_ID }}&count=1" > assets/data/steam.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/data/steam.json
          git commit --allow-empty -m "chore: autoupdate steam activity $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
